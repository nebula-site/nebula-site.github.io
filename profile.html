<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>My Profile</title>
  <link rel="stylesheet" href="/css/main.css" />
  <link rel="stylesheet" href="/css/navbar.css" />
  <link rel="stylesheet" href="/css/game-menu.css" />
  <script src="/javascript/navbar.js" defer></script>
  <script src="/javascript/main.js" defer></script>
</head>
<body>
  <canvas></canvas>
  <div id="navbar-element"></div>
  <script>
    const user = JSON.parse(localStorage.getItem('user'));

    const profileDiv = document.getElementById('profile-content');

    if (user) {
      profileDiv.innerHTML = `
        <img src="${user.avatar}" alt="Avatar" style="width:80px;border-radius:50%;">
        <p><strong>Name:</strong> ${user.name}</p>
        <p><strong>Email:</strong> ${user.email}</p>
      `;
    } else {
      profileDiv.innerHTML = `<p>Please <a href="/index.html">log in</a> to see your profile.</p>`;
    }
  </script>
</body>
</html>
