<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Play Game</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 100%;
      height: 100%;
      font-family: 'Nunito', sans-serif;
      background-color: #000;
      background-image: radial-gradient(circle at top right, rgba(121, 68, 154, 0.13), transparent),
        radial-gradient(circle at 20% 80%, rgba(41, 196, 255, 0.13), transparent);
      margin: 0;
    }

    canvas {
      position: fixed;
      top: 0;
      left: 0;
      z-index: -1;
      width: 100%;
      height: 100%;
      background: transparent;
    }

    .game-wrapper {
      position: relative;
      width: 960px;
      max-width: 100%;
      border: 3px solid #333;
      border-radius: 12px 12px 0 0;
      overflow: hidden;
      box-shadow: 0 0 20px rgba(0, 0, 0, 0.8);
      margin: 50px auto 0;
    }

    iframe {
      width: 100%;
      height: 600px;
      border: none;
      background-color: #000;
      display: block;
      transition: all 0.5s ease; /* Smooth transition for iframe */
    }

    .bottom-bar {
      width: 960px;
      max-width: 100%;
      background-color: #1b1b1b;
      padding: 10px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-radius: 0 0 12px 12px;
      box-shadow: 0 -3px 10px rgba(0, 0, 0, 0.4);
      margin: 0 auto 40px;
      height: 50px;
      transition: all 0.5s ease; /* Smooth transition for bottom bar */
    }

    .game-info {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .game-info img {
      width: 40px;
      height: 40px;
      object-fit: cover;
      border-radius: 8px;
    }

    .game-info span {
      font-size: 16px;
      font-weight: bold;
      color: #ccc;
    }

    .controls {
      display: flex;
      gap: 10px;
    }

    .controls button,
    .controls a {
      background: rgba(255, 255, 255, 0.1);
      border: none;
      color: white;
      padding: 8px 12px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      transition: background 0.2s;
      text-decoration: none;
      display: flex;
      align-items: center;
      justify-content: center;
      height: auto;
    }

    .controls button:hover,
    .controls a:hover {
      background: rgba(255, 255, 255, 0.3);
    }

    .play-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(10, 10, 10, 0.85);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10;
      transition: opacity 0.4s ease;
    }

    .play-overlay.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .play-button {
      background: rgba(255, 255, 255, 0.1);
      border: 2px solid #fff;
      color: white;
      font-size: 24px;
      padding: 16px 32px;
      border-radius: 50px;
      cursor: pointer;
      text-transform: uppercase;
      font-weight: bold;
      transition: background 0.3s, transform 0.2s;
    }

    .play-button:hover {
      background: rgba(255, 255, 255, 0.3);
      transform: scale(1.05);
    }

    .play-button i {
      margin-right: 10px;
    }

    form button {
      margin-top: 2em;
      padding: 0.8em;
      border: none;
      background: #00f0ff;
      color: #000;
      font-weight: bold;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.3s ease;
    }

    form button:hover {
      background: #00c0cc;
    }

    #top-text {
      margin-top: 75px;
      font-family: Nunito;
      color: #fff;
      animation: glow 2s ease-in-out infinite;
      font-size: 4rem;
    }

    @keyframes glow {
      0% { text-shadow: 0 0 5px lightgrey, 0 0 10px #fff; }
      50% { text-shadow: 0 0 10px #fff, 0 0 20px lightgrey; }
      100% { text-shadow: 0 0 5px lightgrey, 0 0 10px #fff; }
    }
  </style>
</head>
<body>
  <canvas></canvas>
  <div class="game-wrapper">
    <div class="play-overlay" id="playOverlay">
      <button class="play-button" onclick="startGame()"><i class="fa fa-play"></i> Play</button>
    </div>
    <iframe id="myIframe" src=""></iframe>
  </div>

  <div class="bottom-bar" id="bottomBar">
    <div class="game-info">
      <img id="game-image" src="/images/placeholder.png" alt="Game Icon">
      <span id="game-name">Loading...</span>
    </div>

    <div class="controls">
      <a href="/games" title="Go Home"><i class="fa fa-home"></i></a>
      <button onclick="reloadGame()" title="Reload Game"><i class="fa fa-rotate-right"></i></button>
      <button id="fullscreenBtn" onclick="toggleFullscreen()" title="Fullscreen"><i class="fa fa-expand"></i></button>
    </div>
  </div>

  <script>
    let gameLink = '';
    let iframe = document.getElementById('myIframe');
    let fullscreenBtn = document.getElementById('fullscreenBtn');
    let bottomBar = document.getElementById('bottomBar');
    let iframeHeight = iframe.offsetHeight;

    document.addEventListener('DOMContentLoaded', () => {
      const name = sessionStorage.getItem('gameName');
      const image = sessionStorage.getItem('gameImage');
      gameLink = sessionStorage.getItem('gameLink');

      const gameName = document.getElementById('game-name');
      const gameImage = document.getElementById('game-image');

      if (gameLink && name && image) {
        gameName.textContent = name;
        gameImage.src = image;
      } else {
        gameName.textContent = "Game Not Found";
      }

      adjustLayout();
    });

    function startGame() {
      iframe.src = gameLink;
      const overlay = document.getElementById('playOverlay');
      overlay.classList.add('hidden');
    }

    function reloadGame() {
      iframe.src = iframe.src;
    }

    function toggleFullscreen() {
      if (document.fullscreenElement) {
        document.exitFullscreen();
        fullscreenBtn.innerHTML = '<i class="fa fa-expand"></i>';
        bottomBar.style.height = '50px'; // Default height
        bottomBar.style.width = '960px'; // Default width
        iframe.style.height = `${iframeHeight}px`; // Reset iframe height
      } else {
        iframe.requestFullscreen();
        fullscreenBtn.innerHTML = '<i class="fa fa-compress"></i>';
        bottomBar.style.height = '50px'; // Default height
        bottomBar.style.width = '100%'; // Full width
        iframe.style.height = `calc(100vh - 50px)`; // Reduced iframe height
      }
    }

    // Adjust iframe and navbar layout when fullscreen changes
    document.addEventListener('fullscreenchange', () => {
      if (document.fullscreenElement) {
        bottomBar.style.height = '50px';
        bottomBar.style.width = '100%';
        iframe.style.height = `calc(100vh - 50px)`;
      } else {
        bottomBar.style.height = '50px';
        bottomBar.style.width = '960px';
        iframe.style.height = `${iframeHeight}px`;
      }
    });

    function adjustLayout() {
      let bottomBarHeight = bottomBar.offsetHeight;
      iframe.style.height = `calc(100vh - ${bottomBarHeight}px)`;
    }
  </script>
</body>
</html>
