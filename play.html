<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Play Game</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background-color: #111;
      color: white;
      height: 100vh;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .game-wrapper {
      position: relative;
      width: 960px;
      height: 600px;
      border: 3px solid #333;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 0 20px rgba(0, 0, 0, 0.8);
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
      background-color: #000;
    }

    .controls {
      position: absolute;
      bottom: 15px;
      right: 15px;
      display: flex;
      gap: 10px;
    }

    .controls button {
      background: rgba(0, 0, 0, 0.7);
      border: none;
      color: white;
      padding: 8px 12px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      transition: background 0.2s;
    }

    .controls button:hover {
      background: rgba(255, 255, 255, 0.2);
    }

    .game-info {
      position: absolute;
      bottom: 15px;
      left: 15px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .game-info img {
      width: 40px;
      height: 40px;
      object-fit: cover;
      border-radius: 8px;
    }

    .game-info span {
      font-size: 16px;
      font-weight: bold;
      color: #ccc;
    }
  </style>
</head>
<body>
  <div class="game-wrapper">
    <iframe id="myIframe" src=""></iframe>

    <div class="controls">
      <button onclick="reloadGame()"><i class="fa fa-rotate-right"></i></button>
      <button onclick="toggleFullscreen()"><i class="fa fa-expand"></i></button>
    </div>

    <div class="game-info">
      <img id="game-image" src="/images/placeholder.png" alt="Game Logo">
      <span id="game-name">Loading...</span>
    </div>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const iframe = document.getElementById('myIframe');
      const gameName = document.getElementById('game-name');
      const gameImage = document.getElementById('game-image');

      const link = sessionStorage.getItem('gameLink');
      const name = sessionStorage.getItem('gameName');
      const image = sessionStorage.getItem('gameImage');

      if (link && name && image) {
        iframe.src = link;
        gameName.textContent = name;
        gameImage.src = image;
      } else {
        gameName.textContent = "Game Not Found";
      }
    });

    function reloadGame() {
      const iframe = document.getElementById('myIframe');
      iframe.src = iframe.src;
    }

    function toggleFullscreen() {
      const iframe = document.getElementById('myIframe');
      if (iframe.requestFullscreen) {
        iframe.requestFullscreen();
      } else if (iframe.webkitRequestFullscreen) {
        iframe.webkitRequestFullscreen();
      } else if (iframe.msRequestFullscreen) {
        iframe.msRequestFullscreen();
      }
    }
  </script>
</body>
</html>
