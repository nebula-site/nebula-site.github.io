<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Play Game</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background-color: #111;
      color: white;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    .game-wrapper {
      position: relative;
      width: 960px;
      max-width: 100%;
      border: 3px solid #333;
      border-radius: 12px 12px 0 0;
      overflow: hidden;
      box-shadow: 0 0 20px rgba(0, 0, 0, 0.8);
    }

    iframe {
      width: 100%;
      height: 600px;
      border: none;
      background-color: #000;
      display: block;
    }

    .bottom-bar {
      width: 960px;
      max-width: 100%;
      background-color: #1b1b1b;
      padding: 10px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-radius: 0 0 12px 12px;
      box-shadow: 0 -3px 10px rgba(0, 0, 0, 0.4);
    }

    .game-info {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .game-info img {
      width: 40px;
      height: 40px;
      object-fit: cover;
      border-radius: 8px;
    }

    .game-info span {
      font-size: 16px;
      font-weight: bold;
      color: #ccc;
    }

    .controls {
      display: flex;
      gap: 10px;
    }

    .controls button,
    .controls a {
      background: rgba(255, 255, 255, 0.1);
      border: none;
      color: white;
      padding: 8px 12px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      transition: background 0.2s;
      text-decoration: none;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .controls button:hover,
    .controls a:hover {
      background: rgba(255, 255, 255, 0.3);
    }

    .play-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(10, 10, 10, 0.85);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10;
      transition: opacity 0.4s ease;
    }

    .play-overlay.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .play-button {
      background: rgba(255, 255, 255, 0.1);
      border: 2px solid #fff;
      color: white;
      font-size: 24px;
      padding: 16px 32px;
      border-radius: 50px;
      cursor: pointer;
      text-transform: uppercase;
      font-weight: bold;
      transition: background 0.3s, transform 0.2s;
    }

    .play-button:hover {
      background: rgba(255, 255, 255, 0.3);
      transform: scale(1.05);
    }

    .play-button i {
      margin-right: 10px;
    }
  </style>
</head>
<body>
  <div class="game-wrapper">
    <div class="play-overlay" id="playOverlay">
      <button class="play-button" onclick="startGame()"><i class="fa fa-play"></i> Play</button>
    </div>
    <iframe id="myIframe" src=""></iframe>
  </div>

  <div class="bottom-bar">
    <div class="game-info">
      <img id="game-image" src="/images/placeholder.png" alt="Game Icon">
      <span id="game-name">Loading...</span>
    </div>

    <div class="controls">
      <a href="/" title="Go Home"><i class="fa fa-home"></i></a>
      <button onclick="reloadGame()" title="Reload Game"><i class="fa fa-rotate-right"></i></button>
      <button onclick="toggleFullscreen()" title="Fullscreen"><i class="fa fa-expand"></i></button>
    </div>
  </div>

  <script>
    let gameLink = '';
    document.addEventListener('DOMContentLoaded', () => {
      const name = sessionStorage.getItem('gameName');
      const image = sessionStorage.getItem('gameImage');
      gameLink = sessionStorage.getItem('gameLink');

      const gameName = document.getElementById('game-name');
      const gameImage = document.getElementById('game-image');

      if (gameLink && name && image) {
        gameName.textContent = name;
        gameImage.src = image;
      } else {
        gameName.textContent = "Game Not Found";
      }
    });

    function startGame() {
      const iframe = document.getElementById('myIframe');
      iframe.src = gameLink;

      const overlay = document.getElementById('playOverlay');
      overlay.classList.add('hidden');
    }

    function reloadGame() {
      const iframe = document.getElementById('myIframe');
      iframe.src = iframe.src;
    }

    function toggleFullscreen() {
      const iframe = document.getElementById('myIframe');
      if (iframe.requestFullscreen) {
        iframe.requestFullscreen();
      } else if (iframe.webkitRequestFullscreen) {
        iframe.webkitRequestFullscreen();
      } else if (iframe.msRequestFullscreen) {
        iframe.msRequestFullscreen();
      }
    }
  </script>
</body>
</html>
